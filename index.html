<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Embedded | Systems Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border: 1px solid #334155; padding: 1.5rem; border-radius: 0.75rem; }
    </style>
</head>
<body>

    <main class="max-w-4xl mx-auto py-16 px-6">
        <!-- Hero Section -->
        <section class="text-center mb-16">
            <h1 id="user-name" class="text-5xl font-bold mb-2 text-blue-400"></h1>
            <p id="user-title" class="text-xl text-slate-400 mb-6"></p>
            <a id="resume-btn" href="#" download class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-bold">Download Resume (PDF)</a>
        </section>

        <!-- Dynamic Sections -->
        <div class="space-y-12">
            <section>
                <h2 class="text-2xl font-bold mb-6 border-l-4 border-blue-500 pl-4">Core Research</h2>
                <div id="research-list" class="grid md:grid-cols-2 gap-4"></div>
            </section>

            <section>
                <h2 class="text-2xl font-bold mb-6 border-l-4 border-green-500 pl-4">Projects</h2>
                <div id="project-list" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <!-- 1. Load the data first -->
    <script src="content.js"></script>

    <!-- 2. Execute the logic inside script tags -->
    <script>
        // Logic to inject data
        document.getElementById('user-name').innerText = PROFILE_DATA.name;
        document.getElementById('user-title').innerText = PROFILE_DATA.title;
        document.getElementById('resume-btn').href = PROFILE_DATA.resumeLink;

        // Render Research
        const researchContainer = document.getElementById('research-list');
        PROFILE_DATA.research.forEach(item => {
            researchContainer.innerHTML += `
                <div class="card">
                    <h3 class="text-blue-400 font-bold mb-1">${item.topic}</h3>
                    <p class="text-sm text-slate-400">${item.description}</p>
                </div>`;
        });

        // Render Projects (Grouped by Category)
        const projectContainer = document.getElementById('project-list');
        PROFILE_DATA.projectGroups.forEach(group => {
            let groupHtml = `
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-slate-300 mb-4 uppercase tracking-wider text-sm">${group.category}</h3>
                    <div class="grid gap-4">`;
            
            group.items.forEach(p => {
                groupHtml += `
                    <div class="card hover:border-blue-500 transition-colors">
                        <div class="flex justify-between items-start">
                            <h4 class="text-lg font-bold italic text-white">${p.name}</h4>
                            <span class="text-xs font-mono text-slate-500">${p.repo}</span>
                        </div>
                        <p class="text-slate-400 text-sm mt-1">${p.desc}</p>
                    </div>`;
            });

            groupHtml += `</div></div>`;
            projectContainer.innerHTML += groupHtml;
        });
    </script>
</body>
</html>
